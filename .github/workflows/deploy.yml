name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: true
          NODE_ENV: production

      - name: Verify data files exist
        run: |
          test -f dist/data/points.geojson || (echo "ERROR: points.geojson missing — 本地需先跑 npm run build:data 并提交 public/data/"; exit 1)
          test -f dist/data/track.geojson  || (echo "ERROR: track.geojson missing"; exit 1)
          test -f dist/data/summary.json   || (echo "ERROR: summary.json missing"; exit 1)
          test -f dist/data/places.json    || (echo "ERROR: places.json missing — 本地需先跑 npm run build:data"; exit 1)
          echo "Data files OK:"
          ls -lh dist/data/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # 主动传 ASCII-only 的 commit-message（hash 本身），避免 CF 从 GitHub
          # 拉取含中文/全角符号/箭头等字符时 API 报 code 8000111 Invalid commit message
          command: pages deploy dist --project-name=travel-map --branch=${{ github.head_ref || github.ref_name }} --commit-hash=${{ github.sha }} --commit-message=deploy-${{ github.sha }} --commit-dirty=true
